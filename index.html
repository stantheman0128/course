<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資工系畢業學分檢核系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* v1.10.0: container 變成上下漸層紫色帶，中間白色內容區 */
        .container {
            max-width: 1920px;
            margin: 0 auto;
            background:
                linear-gradient(
                    180deg,
                    transparent 0px,
                    transparent 200px,
                    #f8f9fa 320px,
                    #f8f9fa calc(100% - 220px),
                    transparent calc(100% - 100px),
                    transparent 100%
                );
            min-height: 100vh;
            position: relative;
        }

        /* 星星網絡背景 */
        #stellar-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.7;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        .footer {
            position: relative;
            z-index: 1;
        }

        /* v1.10.0: header 透明，融入 body 紫色 gradient + 星空 */
        .header {
            background: transparent;
            color: white;
            padding: 35px 30px 30px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
        }
        
        /* ===== Sticky統計區域（玻璃擬態）===== */
        .stats {
            position: sticky;
            top: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 25px 30px;
            background: transparent;
            border-bottom: 1px solid transparent;
            will-change: padding, gap;
            transition:
                padding 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                gap 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                background-color 0.35s ease,
                box-shadow 0.35s ease,
                border-bottom-color 0.35s ease,
                backdrop-filter 0.35s ease,
                -webkit-backdrop-filter 0.35s ease;
        }

        .stats.scrolled {
            padding: 10px 20px;
            gap: 15px;
            grid-template-columns: repeat(4, auto);
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(102, 126, 234, 0.15);
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        .stat-item {
            text-align: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow:
                0 8px 32px rgba(102, 126, 234, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            will-change: padding, transform;
            transition:
                padding 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                background-color 0.35s ease,
                box-shadow 0.35s ease,
                border-color 0.35s ease,
                border-radius 0.35s ease,
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-item:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 40px rgba(102, 126, 234, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .stats.scrolled .stat-item {
            background-color: transparent;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            box-shadow: 0 0 0 rgba(102, 126, 234, 0);
            border-color: transparent;
            border-right-color: rgba(102, 126, 234, 0.2);
            border-right-width: 2px;
            padding: 5px 20px 5px 0;
            border-radius: 0;
            flex-direction: row;
            gap: 6px;
            margin-right: 15px;
        }

        .stats.scrolled .stat-item:hover {
            transform: none;
        }

        .stats.scrolled .stat-item:last-child {
            border-right-color: transparent;
            padding-right: 0;
            margin-right: 0;
        }
        
        .stat-item.highlight {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 16px 48px rgba(102, 126, 234, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        
        .stats.scrolled .stat-item.highlight {
            transform: none;
            box-shadow: none;
        }
        
        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: #667eea;
            display: inline-block;
            margin-bottom: 8px;
            transition:
                font-size 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                margin 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats.scrolled .stat-number {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 0;
        }

        .stat-label {
            font-size: 14px;
            color: #6c757d;
            font-weight: 500;
            display: inline-block;
            transition: font-size 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats.scrolled .stat-label {
            font-size: 12px;
        }

        .progress-bar {
            background: #e9ecef;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
            opacity: 1;
            transition:
                height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease;
        }
        
        .stats.scrolled .progress-bar {
            height: 0;
            margin-top: 0;
            opacity: 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.8s ease;
            border-radius: 4px;
        }
        
        /* 豎屏 */
        @media (max-width: 1199px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                padding: 20px;
            }
            
            .stats.scrolled {
                grid-template-columns: repeat(4, auto);
                padding: 8px 15px;
            }
            
            .stat-number {
                font-size: 36px;
            }
        }
        
        /* ===== 內容區域 ===== */
        .content-wrapper {
            display: flex;
            min-height: calc(100vh - 200px);
        }
        
        @media (max-width: 1199px) {
            .content-wrapper {
                flex-direction: column;
            }
        }
        
        @media (min-width: 1200px) {
            .content-wrapper {
                flex-direction: row;
            }
        }
        
        /* ===== 橫屏：左側選課區（玻璃卡片）===== */
        @media (min-width: 1200px) {
            .simulator-panel {
                width: 360px;
                flex-shrink: 0;
                margin: 15px;
                margin-right: 0;
                background: rgba(255, 255, 255, 0.75);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.5);
                border-radius: 20px;
                position: sticky;
                top: 70px;
                max-height: calc(100vh - 100px);
                overflow: visible;
                display: flex;
                flex-direction: column;
                box-shadow: 
                    0 8px 32px rgba(102, 126, 234, 0.12),
                    inset 0 1px 0 rgba(255, 255, 255, 0.8);
            }
            
            .simulator-panel-header {
                padding: 18px 20px;
                background: transparent;
                border-bottom: 1px solid rgba(102, 126, 234, 0.1);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }

            .simulator-title {
                font-size: 18px;
                font-weight: 700;
                color: #1f2937;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .course-grid {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 12px 15px 15px;
            }
        }
        
        /* 豎屏隱藏桌面版選課區 */
        @media (max-width: 1199px) {
            .simulator-panel {
                display: none;
            }
        }
        
        /* ===== 樹狀圖區域 ===== */
        .tree-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 標題列 - 玻璃擬態 */
        .tree-header {
            position: sticky;
            top: 70px;
            z-index: 50;
            padding: 15px 25px;
            margin: 15px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 32px rgba(102, 126, 234, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 1199px) {
            .tree-header.floating {
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 
                    0 8px 40px rgba(102, 126, 234, 0.2),
                    inset 0 1px 0 rgba(255, 255, 255, 0.9);
            }
        }
        
        @media (min-width: 1200px) {
            .tree-header {
                margin: 15px 25px 15px 15px;
                top: 70px;
            }
        }
        
        .tree-header-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            flex: 1;
            text-align: center;
        }
        
        /* v1.10.0: ghost 風格 — 透明底，hover 出現淡紫圓形 */
        .header-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            background: transparent;
            color: #9ca3af;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition:
                background-color 0.25s ease,
                color 0.25s ease,
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:hover {
            background: rgba(102, 126, 234, 0.12);
            color: #667eea;
        }

        .header-btn.active {
            background: rgba(102, 126, 234, 0.16);
            color: #667eea;
            transform: rotate(45deg);
        }
        
        /* 橫屏隱藏選課按鈕 */
        @media (min-width: 1200px) {
            #course-btn {
                display: none;
            }
            
            .tree-header-title {
                text-align: left;
                padding-left: 10px;
            }
        }
        
        /* ===== 豎屏選課遮罩和面板（iOS Bottom Sheet 風格）===== */
        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        
        .mobile-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .mobile-course-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            z-index: 250;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 
                0 -10px 60px rgba(0, 0, 0, 0.15),
                0 -2px 20px rgba(102, 126, 234, 0.1);
            overflow: hidden;
        }
        
        .mobile-course-panel.active {
            transform: translateY(0);
        }
        
        /* 拖曳指示器 */
        .mobile-panel-handle {
            width: 36px;
            height: 5px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
            margin: 12px auto 8px;
        }
        
        .mobile-panel-header {
            padding: 12px 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        /* v1.10.0: outline + glass 風格 — 取消實心紫色 gradient */
        .select-all-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #667eea;
            border: 1.5px solid rgba(102, 126, 234, 0.5);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition:
                background-color 0.25s ease,
                border-color 0.25s ease,
                color 0.25s ease,
                transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .select-all-btn:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: rgba(102, 126, 234, 0.9);
            transform: translateY(-1px);
        }

        .select-all-btn:active {
            transform: translateY(0);
        }

        /* 選中狀態用 amber 而非 red，較不刺眼 */
        .select-all-btn.selected {
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.5);
            background: rgba(255, 255, 255, 0.4);
        }

        .select-all-btn.selected:hover {
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.9);
        }

        /* ===== v1.11.0: Classic theme overrides (pre-v1.10.0 visual) ===== */
        body.theme-classic {
            background-attachment: scroll;
        }
        body.theme-classic .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px 30px;
        }
        body.theme-classic .container {
            background: #f8f9fa;
        }
        body.theme-classic .footer {
            background: rgba(248, 249, 250, 0.9);
            padding: 25px;
            color: #6c757d;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        body.theme-classic .footer kbd {
            background: #e5e7eb;
            color: inherit;
            border: none;
        }
        body.theme-classic .footer-subtitle {
            color: #9ca3af;
        }
        body.theme-classic .version-link {
            color: #667eea;
            border-bottom-color: rgba(102, 126, 234, 0.4);
        }
        body.theme-classic .version-link:hover {
            color: #764ba2;
            border-bottom-color: rgba(118, 75, 162, 0.6);
        }
        body.theme-classic #stellar-bg {
            opacity: 0.6;
        }
        body.theme-classic .select-all-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 7px 14px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }
        body.theme-classic .select-all-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4);
        }
        body.theme-classic .select-all-btn.selected {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }
        body.theme-classic .select-all-btn.selected:hover {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-color: transparent;
            box-shadow: 0 6px 18px rgba(239, 68, 68, 0.4);
        }
        body.theme-classic .header-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            font-size: 16px;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        body.theme-classic .header-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        body.theme-classic .header-btn.active {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            transform: rotate(45deg);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        /* footer subtitle — class form so theme-classic can override color */
        .footer-subtitle {
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.65);
        }

        /* Theme switcher button inside Changelog modal */
        .theme-switch-btn {
            margin-top: 12px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.08);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
            cursor: pointer;
            transition:
                background-color 0.2s ease,
                border-color 0.2s ease,
                color 0.2s ease;
            float: right;
        }
        .theme-switch-btn:hover {
            background: rgba(102, 126, 234, 0.16);
            border-color: rgba(102, 126, 234, 0.6);
        }
        .theme-switch-btn.active {
            background: rgba(16, 185, 129, 0.12);
            color: #059669;
            border-color: rgba(16, 185, 129, 0.4);
            cursor: default;
            pointer-events: none;
        }

        /* ===== Changelog Modal ===== */
        /* v1.10.0: footer 改紫底，version link 改白色 */
        .version-link {
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }

        .version-link:hover {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.8);
        }

        .changelog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s cubic-bezier(0.32, 0.72, 0, 1), visibility 0.4s;
        }

        .changelog-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .changelog-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%) scale(0.95);
            width: 90%;
            max-width: 640px;
            max-height: 85vh;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.25);
            z-index: 1501;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.45s cubic-bezier(0.32, 0.72, 0, 1), visibility 0.45s, transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .changelog-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .changelog-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            flex-shrink: 0;
        }

        .changelog-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }

        .changelog-header p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 2px;
        }

        .changelog-close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(102, 126, 234, 0.15);
            color: #6b7280;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .changelog-close-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            transform: rotate(90deg);
        }

        .changelog-content {
            padding: 20px 24px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .changelog-entry {
            padding: 18px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(102, 126, 234, 0.12);
            border-radius: 16px;
            margin-bottom: 14px;
            transition: all 0.3s ease;
        }

        .changelog-entry:hover {
            transform: translateX(2px);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.1);
        }

        .changelog-entry:last-child {
            margin-bottom: 0;
        }

        .changelog-version-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(102, 126, 234, 0.15);
        }

        .changelog-version {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .changelog-date {
            font-size: 12px;
            color: #9ca3af;
        }

        .changelog-tag {

<body>

                    </button>

            <p class="footer-subtitle">Made with ❤️ by Stan &amp; Claude | 按 <kbd>F</kbd> 全螢幕 · <kbd>C</kbd> 選課</p>

            </div>
            <button class="changelog-close-btn" onclick="closeChangelog()" title="關閉 (Esc)">✕</button>

    <script>
        // 114-2學期課程（依學分 desc → 必修優先順序排列）
        const currentSemesterCourses = [
            {name: "計算機結構", credits: 3, type: "cs_core"},
            {name: "演算法", credits: 3, type: "cs_core"},
            {name: "離散數學", credits: 3, type: "math_core"},
            {name: "資訊專題研究（二）：資訊系統", credits: 3, type: "project"},
            {name: "數位邏輯", credits: 3, type: "hardware"},
            {name: "影像處理", credits: 3, type: "multimedia"},
            {name: "計算機圖學", credits: 3, type: "multimedia"},
            {name: "資安攻防演練", credits: 3, type: "dept_elective"},
            {name: "體育（籃球初級）", credits: 1, type: "pe"}
        ];

        let simulatedCourses = new Set();
        let currentEarned = 94;
        let currentPercentage = 73.4;
        let currentRemaining = 34;
        let mobileCoursesOpen = false;
        
        // 滾動閾值（縮小）
        const SCROLL_THRESHOLD = 50;

        // Scroll監聽
        window.addEventListener('scroll', () => {
            const stats = document.getElementById('stats');
            const treeHeader = document.getElementById('tree-header');
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > SCROLL_THRESHOLD) {
                stats.classList.add('scrolled');
                treeHeader.classList.add('floating');
            } else {
                stats.classList.remove('scrolled');
                treeHeader.classList.remove('floating');
            }
        });

        // 快捷鍵
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            if (e.key.toLowerCase() === 'f') {
                e.preventDefault();
                toggleFullscreen();
            } else if (e.key.toLowerCase() === 'c') {
                e.preventDefault();
                if (window.innerWidth < 1200) {
                    toggleMobileCourses();
                }
            } else if (e.key === 'Escape') {
                if (changelogOpen) {
                    closeChangelog();
                    return;
                }
                closeMobileCourses();
                const panel = document.getElementById('tree-panel');
                if (panel.classList.contains('fullscreen')) {
                    toggleFullscreen();
                }
            }
        });
        
        function showShortcutHint(text) {
            const hint = document.getElementById('shortcut-hint');
            hint.textContent = text;
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 1500);
        }

        // 豎屏選課切換
        function toggleMobileCourses() {
            if (mobileCoursesOpen) {
                closeMobileCourses();
            } else {
                openMobileCourses();
            }
        }
        
        function openMobileCourses() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            // 滾動到安全位置
            if (scrollTop < SCROLL_THRESHOLD + 20) {

        // 全螢幕切換
        function toggleFullscreen() {
            const panel = document.getElementById('tree-panel');
            const btn = document.getElementById('fullscreen-btn');
            const canvas = document.getElementById('stellar-bg');
            const container = document.querySelector('.container');
            
            if (panel.classList.contains('fullscreen')) {
                // 退出全螢幕
                panel.classList.remove('fullscreen');
                document.body.classList.remove('fullscreen-mode');
                btn.innerHTML = '⛶';
                // 把 canvas 移回 container
                container.insertBefore(canvas, container.firstChild);
                showShortcutHint('退出全螢幕');
            } else {
                // 進入全螢幕
                panel.classList.add('fullscreen');
                document.body.classList.add('fullscreen-mode');
                btn.innerHTML = '✕';
                // 把 canvas 移到 tree-panel 內部最前面
                panel.insertBefore(canvas, panel.firstChild);
                showShortcutHint('全螢幕模式');
            }
        }

        // 渲染課程
        function renderCurrentCourses() {
            const desktopContainer = document.getElementById('current-courses');
            const mobileContainer = document.getElementById('mobile-courses');
            
            const createCourseItem = (course, isMobile = false) => {
                const div = document.createElement('div');
                div.className = 'course-item-sim' + (isMobile ? ' mobile-course-item' : '');
                if (simulatedCourses.has(course.name)) {
                    div.classList.add('selected');
                }
                
                div.onclick = (e) => {
                    if (e.target.type !== 'checkbox') {
                        toggleCourse(course.name);
                    }
                };
                
                div.innerHTML = `
                    <input type="checkbox" ${simulatedCourses.has(course.name) ? 'checked' : ''} 
                           onchange="toggleCourse('${course.name}')">
                    <span class="course-name-sim">${course.name}</span>
                    <span class="course-credits-sim">${course.credits}學分</span>
                `;
                
                return div;
            };
            
            desktopContainer.innerHTML = '';
            mobileContainer.innerHTML = '';
            
            currentSemesterCourses.forEach(course => {
                desktopContainer.appendChild(createCourseItem(course, false));
                mobileContainer.appendChild(createCourseItem(course, true));
            });
        }

        // 切換課程選擇
        function toggleCourse(courseName) {
            if (simulatedCourses.has(courseName)) {
                simulatedCourses.delete(courseName);
            } else {
                simulatedCourses.add(courseName);
            }
            renderCurrentCourses();
            updateSelectAllBtnState();
            updateTreeRealtime();
        }

        function toggleAllCourses() {
            const allSelected = simulatedCourses.size === currentSemesterCourses.length;
            if (allSelected) {
                simulatedCourses.clear();
            } else {
                currentSemesterCourses.forEach(c => simulatedCourses.add(c.name));
            }
            renderCurrentCourses();
            updateSelectAllBtnState();
            updateTreeRealtime();
        }

        function updateSelectAllBtnState() {
            const allSelected = simulatedCourses.size === currentSemesterCourses.length;
            const text = allSelected ? '取消全選' : '全選';
            ['select-all-btn', 'mobile-select-all-btn'].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.textContent = text;
                btn.classList.toggle('selected', allSelected);
            });
        }

                    const btn = document.createElement('button');
                    btn.className = 'theme-switch-btn';
                    const isActive = entry.theme === activeTheme;
                    btn.textContent = isActive ? '📍 已套用此樣式' : '切換到此樣式 →';
                    if (isActive) btn.classList.add('active');
                    btn.onclick = () => {
                        setTheme(entry.theme);
                        renderChangelog();
                    };
                    entryDiv.appendChild(btn);
                    const clearDiv = document.createElement('div');
                    clearDiv.style.clear = 'both';
                    entryDiv.appendChild(clearDiv);
                }

                container.appendChild(entryDiv);
            });
        }

        // ===== v1.11.0: Theme Switching =====
        function getCurrentTheme() {
            return localStorage.getItem('course-theme') || 'current';
        }

        function setTheme(themeName) {
            document.body.classList.remove('theme-classic');
            if (themeName === 'classic') {
                document.body.classList.add('theme-classic');
            }
            localStorage.setItem('course-theme', themeName);
        }

        function initTheme() {
            setTheme(getCurrentTheme());
        }

        // 實時更新
        function updateTreeRealtime() {
            let additionalCredits = 0;
            simulatedCourses.forEach(courseName => {
                const course = currentSemesterCourses.find(c => c.name === courseName);
                if (course) additionalCredits += course.credits;
            });
            
            const newTotal = 94 + additionalCredits;
            const newPercentage = (newTotal / 128 * 100).toFixed(1);
            const newRemaining = 128 - newTotal;
            
            document.querySelectorAll('.stat-item').forEach(item => item.classList.add('highlight'));
            setTimeout(() => {
                document.querySelectorAll('.stat-item').forEach(item => item.classList.remove('highlight'));
            }, 500);
            
            animateNumber('total-earned', currentEarned, newTotal, 600);
            animateNumber('remaining', currentRemaining, newRemaining, 600);
            animatePercentage('completion', currentPercentage, parseFloat(newPercentage), 600);
            
            document.getElementById('progress-bar').style.width = newPercentage + '%';
            
            currentEarned = newTotal;
            currentRemaining = newRemaining;
            currentPercentage = parseFloat(newPercentage);
            
            setTimeout(() => {
                const treeRoot = document.getElementById('tree-root');
                walkUpdate(treeRoot, getTreeData());
            }, 100);
        }

        function animateNumber(id, start, end, duration) {
            const element = document.getElementById(id);
            const range = end - start;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(start + range * eased);
                element.textContent = current;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function animatePercentage(id, start, end, duration) {
            const element = document.getElementById(id);
            const range = end - start;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = start + range * eased;
                element.textContent = current.toFixed(1) + '%';
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function calculateStatus(node) {
            if (node.children) {
                node.children.forEach(child => calculateStatus(child));
            }
            
            const earned = node.earned || 0;
            const required = node.credits || 0;
            
            if (earned === 0) {
                node.status = 'incomplete';
            } else if (earned >= required) {
                node.status = 'completed';
            } else {
                node.status = 'partial';
            }
        }

        function shouldAutoExpand(node) {
            return node.status === 'incomplete' || node.status === 'partial';
        }

        // 切換已修課程展開
        function toggleCompletedCourses(summaryEl) {
            const listEl = summaryEl.nextElementSibling;
            const toggleIcon = summaryEl.querySelector('.completed-summary-toggle');

            listEl.classList.toggle('show');
            toggleIcon.classList.toggle('expanded');
        }

        function buildCourseDetail(course, variant) {
            const courseDiv = document.createElement('div');
            courseDiv.className = 'course-detail' + (variant === 'completed' ? ' completed'
                                                  : variant === 'new' ? ' new'
                                                  : variant === 'available' ? ' available' : '');
            if (variant === 'incomplete') {
                courseDiv.style.background = 'linear-gradient(135deg, #fee2e2, #fecaca)';
                courseDiv.style.borderLeftColor = '#ef4444';
            }

            const nameSpan = document.createElement('span');
            nameSpan.textContent = course.name;
            courseDiv.appendChild(nameSpan);

            if (variant === 'available') {
                const creditsSpan = document.createElement('span');
                creditsSpan.textContent = `${course.credits}學分`;
                courseDiv.appendChild(creditsSpan);
                return courseDiv;
            }

            const info = document.createElement('div');
            info.className = 'course-info';

            const creditsSpan = document.createElement('span');
            creditsSpan.textContent = `${course.credits}學分`;
            info.appendChild(creditsSpan);

            if (course.grade) {
                const gradeTag = document.createElement('span');
                gradeTag.className = 'course-tag tag-grade';
                gradeTag.textContent = course.grade;
                info.appendChild(gradeTag);
            }
            if (course.semester) {
                const semTag = document.createElement('span');
                semTag.className = 'course-tag tag-semester';
                semTag.textContent = course.semester;
                info.appendChild(semTag);
            }
            if (variant === 'new') {
                const newTag = document.createElement('span');
                newTag.className = 'course-tag tag-new';
                newTag.textContent = 'NEW';
                info.appendChild(newTag);
            }
            if (course.note && variant === 'incomplete') {
                const noteTag = document.createElement('span');
                noteTag.className = 'course-tag';
                noteTag.style.background = '#fef3c7';
                noteTag.style.color = '#92400e';
                noteTag.textContent = course.note;
                info.appendChild(noteTag);
            }
            courseDiv.appendChild(info);

            if (course.detail && variant === 'new') {
                const detailDiv = document.createElement('div');
                detailDiv.style.cssText = 'font-size:11px;color:#6b7280;margin-top:4px;';
                detailDiv.textContent = course.detail;
                courseDiv.appendChild(detailDiv);
            }

            return courseDiv;
        }

        function renderCourseList(node, innerDiv) {
            const completedCourses = node.courses.filter(c => c.completed && !c.isNew);
            const newCourses = node.courses.filter(c => c.isNew);
            const availableCourses = node.courses.filter(c => c.available);
            const incompleteCourses = node.courses.filter(c => !c.completed && !c.available);

            // 已修課程 - 摺疊顯示，放最上面
            if (completedCourses.length > 0) {
                const summaryLi = document.createElement('li');
                const summaryDiv = document.createElement('div');
                summaryDiv.className = 'completed-summary';
                summaryDiv.onclick = () => toggleCompletedCourses(summaryDiv);

                const summaryText = document.createElement('span');
                summaryText.className = 'completed-summary-text';
                summaryText.textContent = `✓ 已修 ${completedCourses.length} 門課程`;
                summaryDiv.appendChild(summaryText);

                const summaryToggle = document.createElement('span');
                summaryToggle.className = 'completed-summary-toggle';
                summaryToggle.textContent = '▼';
                summaryDiv.appendChild(summaryToggle);

                summaryLi.appendChild(summaryDiv);

                const listDiv = document.createElement('div');
                listDiv.className = 'completed-courses-list';
                const listInner = document.createElement('div');
                listInner.className = 'completed-courses-inner';

                completedCourses.forEach(course => {
                    listInner.appendChild(buildCourseDetail(course, 'completed'));
                });

                listDiv.appendChild(listInner);
                summaryLi.appendChild(listDiv);
                innerDiv.appendChild(summaryLi);
            }

            if (newCourses.length > 0) {
                const headerLi = document.createElement('li');
                headerLi.className = 'section-header';
                headerLi.textContent = '✨ 新增課程';
                innerDiv.appendChild(headerLi);

                newCourses.forEach(course => {
                    const courseLi = document.createElement('li');
                    courseLi.appendChild(buildCourseDetail(course, 'new'));
                    innerDiv.appendChild(courseLi);
                });
            }

            if (incompleteCourses.length > 0) {
                const headerLi = document.createElement('li');
                headerLi.className = 'section-header';
                headerLi.textContent = incompleteCourses.some(c => c.note && c.note.includes('114-2')) ? '📝 本學期修課中' : '✗ 還需修習';
                innerDiv.appendChild(headerLi);

                incompleteCourses.forEach(course => {
                    const courseLi = document.createElement('li');
                    courseLi.appendChild(buildCourseDetail(course, 'incomplete'));
                    innerDiv.appendChild(courseLi);
                });
            }

            if (availableCourses.length > 0) {
                const headerLi = document.createElement('li');
                headerLi.className = 'section-header';
                headerLi.textContent = '💡 可選課程';
                innerDiv.appendChild(headerLi);

                availableCourses.forEach(course => {
                    const courseLi = document.createElement('li');
                    courseLi.appendChild(buildCourseDetail(course, 'available'));
                    innerDiv.appendChild(courseLi);
                });
            }
        }

        function renderTree(node, parentElement, level = 0, isSimulation = false, parentPath = '') {
            const nodeKey = parentPath ? `${parentPath}/${node.name}` : node.name;
            const li = document.createElement('li');
            li.className = 'tree-node';
            li.dataset.nodeKey = nodeKey;
            
            const content = document.createElement('div');
            content.className = 'node-content';
            
            calculateStatus(node);
            
            const icon = document.createElement('div');
            icon.className = `node-icon status-${node.status}`;
            icon.textContent = node.status === 'completed' ? '✓' : 
                              node.status === 'partial' ? '⚠' : '✗';
            content.appendChild(icon);
            
            const label = document.createElement('div');
            label.className = 'node-label';
            label.textContent = node.name;
            content.appendChild(label);
            
            if (node.credits) {
                const credits = document.createElement('div');
                credits.className = 'node-credits';
                
                const earned = document.createElement('span');
                earned.className = 'credits-earned';
                earned.textContent = `${node.earned || 0}`;
                credits.appendChild(earned);
                
                const separator = document.createElement('span');
                separator.textContent = ' / ';
                separator.style.color = '#d1d5db';
                credits.appendChild(separator);
                
                const required = document.createElement('span');
                required.className = 'credits-required';
                required.textContent = `${node.credits}`;
                credits.appendChild(required);
                
                content.appendChild(credits);
            }
            
            if (node.note) {
                const badge = document.createElement('span');
                badge.className = `badge ${node.status === 'incomplete' ? 'badge-danger' : node.status === 'partial' ? 'badge-warning' : 'badge-info'}`;
                badge.textContent = node.note;
                content.appendChild(badge);
            }
            
            if (node.children || node.courses) {
                const toggle = document.createElement('div');
                toggle.className = 'toggle-icon';
                toggle.textContent = '▶';
                content.appendChild(toggle);
                
                content.onclick = (e) => {
                    e.stopPropagation();
                    const childrenEl = li.querySelector(':scope > .tree-children');
                    if (childrenEl) {
                        childrenEl.classList.toggle('show');
                        toggle.classList.toggle('expanded');
                    }
                };
            }
            
            li.appendChild(content);
            
            if (node.courses || node.children) {
                const childrenUl = document.createElement('ul');
                childrenUl.className = 'tree-children';
                
                // 內層包裝（用於grid動畫）
                const innerDiv = document.createElement('div');
                innerDiv.className = 'tree-children-inner';
                
                if (level === 0 || (isSimulation && shouldAutoExpand(node))) {
                    childrenUl.classList.add('show');
                    content.querySelector('.toggle-icon')?.classList.add('expanded');
                }
                
                if (node.courses) {
                    renderCourseList(node, innerDiv);
                } else if (node.children) {
                    node.children.forEach(child => {
                        renderTree(child, innerDiv, level + 1, isSimulation, nodeKey);
                    });
                }
                
                childrenUl.appendChild(innerDiv);
                li.appendChild(childrenUl);
            }

            parentElement.appendChild(li);
        }

        function walkUpdate(treeRoot, newData) {
            const domMap = new Map();
            treeRoot.querySelectorAll('[data-node-key]').forEach(el => {
                domMap.set(el.dataset.nodeKey, el);
            });

            calculateStatus(newData);

            function visit(node, parentPath) {
                const nodeKey = parentPath ? `${parentPath}/${node.name}` : node.name;
                const li = domMap.get(nodeKey);
                if (!li) return;

                // status icon
                const icon = li.querySelector(':scope > .node-content > .node-icon');
                if (icon) {
                    icon.className = `node-icon status-${node.status}`;
                    icon.textContent = node.status === 'completed' ? '✓'
                                     : node.status === 'partial' ? '⚠' : '✗';
                }

                // credits text
                const credits = li.querySelector(':scope > .node-content > .node-credits');
                if (credits && node.credits) {
                    const earnedSpan = credits.querySelector('.credits-earned');
                    const requiredSpan = credits.querySelector('.credits-required');
                    if (earnedSpan) earnedSpan.textContent = `${node.earned || 0}`;
                    if (requiredSpan) requiredSpan.textContent = `${node.credits}`;
                }

                // badge — add/update/remove
                const content = li.querySelector(':scope > .node-content');
                let badge = content?.querySelector(':scope > .badge');
                if (node.note) {
                    const badgeClass = `badge ${node.status === 'incomplete' ? 'badge-danger' : node.status === 'partial' ? 'badge-warning' : 'badge-info'}`;
                    if (!badge) {
                        badge = document.createElement('span');
                        const toggle = content.querySelector(':scope > .toggle-icon');
                        content.insertBefore(badge, toggle || null);
                    }
                    badge.className = badgeClass;
                    badge.textContent = node.note;
                } else if (badge) {
                    badge.remove();
                }

                // .show class + toggle-icon expanded — fires CSS transition
                const childrenUl = li.querySelector(':scope > .tree-children');
                const toggleIcon = li.querySelector(':scope > .node-content > .toggle-icon');
                if (childrenUl) {
                    const isRoot = !parentPath;
                    const shouldShow = isRoot || shouldAutoExpand(node);
                    childrenUl.classList.toggle('show', shouldShow);
                    if (toggleIcon) toggleIcon.classList.toggle('expanded', shouldShow);
                }

                // leaf with courses: rebuild inner course list
                if (node.courses && childrenUl) {
                    const innerDiv = childrenUl.querySelector(':scope > .tree-children-inner');
                    if (innerDiv) {
                        innerDiv.textContent = '';
                        renderCourseList(node, innerDiv);
                    }
                }

                // recurse
                if (node.children) {
                    node.children.forEach(child => visit(child, nodeKey));
                }
            }

            visit(newData, '');
        }

        // 初始化
        initTheme();
        renderCurrentCourses();
        const treeRoot = document.getElementById('tree-root');
        const initialTree = getTreeData();
        renderTree(initialTree, treeRoot, 0, true);
        
        // ===== 星星網絡背景動畫 =====
        (function initStellarBackground() {
            const canvas = document.getElementById('stellar-bg');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let stars = [];
            let shootingStars = [];
            let ripples = [];
            let mouse = { x: null, y: null };
            let time = 0;
            
            // 星星顏色調色盤
            const starColors = [
                { r: 102, g: 126, b: 234 },  // 主紫藍
                { r: 118, g: 75, b: 162 },   // 深紫
                { r: 147, g: 197, b: 253 },  // 淡藍
                { r: 196, g: 181, b: 253 },  // 淡紫
                { r: 165, g: 180, b: 252 },  // 靛藍
            ];
            
            const config = {
                starCount: 130,
                minStarSize: 0.6,
                maxStarSize: 4,
                connectionDistance: 150,
                mouseRadius: 200,
                baseSpeed: 0.15,
                shootingStarInterval: 12000,
                shootingStarChance: 0.4,
            };
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            
            function createStars() {
                stars = [];
                for (let i = 0; i < config.starCount; i++) {
                    const sizeRandom = Math.random();
                    let size;
                    if (sizeRandom < 0.6) {
                        size = config.minStarSize + Math.random() * 1;
                    } else if (sizeRandom < 0.9) {
                        size = 1.5 + Math.random() * 1.5;
                    } else {
                        size = 2.5 + Math.random() * (config.maxStarSize - 2.5);
                    }
                    
                    const depthFactor = size / config.maxStarSize;
                    const speed = config.baseSpeed * (0.3 + depthFactor * 0.7);
                    const color = starColors[Math.floor(Math.random() * starColors.length)];
                    
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * speed,
                        vy: (Math.random() - 0.5) * speed,
                        size: size,
                        baseOpacity: size > 2.5 ? 0.4 + Math.random() * 0.2 : 0.5 + Math.random() * 0.4,
                        color: color,
                        twinkleSpeed: 0.02 + Math.random() * 0.03,
                        twinklePhase: Math.random() * Math.PI * 2,
                        twinkleAmount: 0.2 + Math.random() * 0.3,
                    });
                }
            }
            
            function createShootingStar() {
                if (Math.random() > config.shootingStarChance) return;
                const startX = Math.random() * width * 0.7;
                const startY = Math.random() * height * 0.3;
                const angle = Math.PI / 6 + Math.random() * Math.PI / 6;
                const speed = 8 + Math.random() * 6;
                shootingStars.push({
                    x: startX, y: startY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1, decay: 0.015 + Math.random() * 0.01,
                    length: 80 + Math.random() * 60,
                    size: 1.5 + Math.random() * 1,
                });
            }
            
            function createRipple(x, y) {
                ripples.push({
                    x: x, y: y, radius: 0,
                    maxRadius: 150 + Math.random() * 100,
                    life: 1, decay: 0.02,
                });
            }
            
            function drawStar(star) {
                const twinkle = Math.sin(time * star.twinkleSpeed + star.twinklePhase);
                const opacity = star.baseOpacity + twinkle * star.twinkleAmount * star.baseOpacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${Math.max(0.1, opacity)})`;
                ctx.fill();
            }
            
            function drawShootingStar(star) {
                const gradient = ctx.createLinearGradient(
                    star.x, star.y,
                    star.x - star.vx * star.length / 10,
                    star.y - star.vy * star.length / 10
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${star.life * 0.9})`);
                gradient.addColorStop(0.3, `rgba(200, 210, 255, ${star.life * 0.6})`);
                gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');
                ctx.beginPath();
                ctx.moveTo(star.x, star.y);
                ctx.lineTo(star.x - star.vx * star.length / 10, star.y - star.vy * star.length / 10);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = star.size * star.life;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size * star.life * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.life})`;
                ctx.fill();
            }
            
            function drawRipple(ripple) {
                ctx.beginPath();
                ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(102, 126, 234, ${ripple.life * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            function drawConnection(star1, star2, distance) {
                const opacity = 1 - (distance / config.connectionDistance);
                ctx.beginPath();
                ctx.moveTo(star1.x, star1.y);
                ctx.lineTo(star2.x, star2.y);
                ctx.strokeStyle = `rgba(102, 126, 234, ${opacity * 0.18})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
            
            function update() {
                time++;
                stars.forEach(star => {
                    star.x += star.vx;
                    star.y += star.vy;
                    if (star.x < 0 || star.x > width) star.vx *= -1;
                    if (star.y < 0 || star.y > height) star.vy *= -1;
                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = mouse.x - star.x;
                        const dy = mouse.y - star.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < config.mouseRadius) {
                            const force = (config.mouseRadius - dist) / config.mouseRadius;
                            star.x -= dx * force * 0.015;
                            star.y -= dy * force * 0.015;
                        }
                    }
                    ripples.forEach(ripple => {
                        const dx = ripple.x - star.x;
                        const dy = ripple.y - star.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (Math.abs(dist - ripple.radius) < 30) {
                            const force = (1 - Math.abs(dist - ripple.radius) / 30) * ripple.life;
                            star.x -= dx / dist * force * 2;
                            star.y -= dy / dist * force * 2;
                        }
                    });
                });
                shootingStars.forEach(star => {
                    star.x += star.vx;
                    star.y += star.vy;
                    star.life -= star.decay;
                });
                shootingStars = shootingStars.filter(s => s.life > 0);
                ripples.forEach(ripple => {
                    ripple.radius += 4;
                    ripple.life -= ripple.decay;
                });
                ripples = ripples.filter(r => r.life > 0);
            }
            
            function draw() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < stars.length; i++) {
                    for (let j = i + 1; j < stars.length; j++) {
                        const dx = stars[i].x - stars[j].x;
                        const dy = stars[i].y - stars[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < config.connectionDistance) {
                            drawConnection(stars[i], stars[j], distance);
                        }
                    }
                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = stars[i].x - mouse.x;
                        const dy = stars[i].y - mouse.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < config.mouseRadius) {
                            ctx.beginPath();
                            ctx.moveTo(stars[i].x, stars[i].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            const opacity = 1 - (distance / config.mouseRadius);
                            ctx.strokeStyle = `rgba(118, 75, 162, ${opacity * 0.25})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                ripples.forEach(drawRipple);
                stars.forEach(drawStar);
                shootingStars.forEach(drawShootingStar);
            }
            
            function animate() {
                update();
                draw();
                requestAnimationFrame(animate);
            }
            
            window.addEventListener('resize', () => { resize(); createStars(); });
            window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
            window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
            window.addEventListener('click', (e) => { createRipple(e.clientX, e.clientY); });
            setInterval(createShootingStar, config.shootingStarInterval);
            
            resize();
            createStars();
            animate();
            setTimeout(createShootingStar, 2000);
        })();
    </script>
